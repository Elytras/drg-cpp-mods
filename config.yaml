# config.yaml netlog skip lists and startup autorun script.
#
# Searched in two locations (first match wins):
#   1. Next to the module DLL  — place here for distribution / in-game use
#   2. Two directories up      — place here for development (next to Drgmods.sln)
#
# netlog changes take effect the next time a log command is enabled:
# disable → edit file → re-enable (or run 'reloadnetlog').
#
# autorun entries are executed on mod load and whenever 'runcfg' is run.
# Each entry is either:
#   - a plain command name (no args — equivalent to calling with dummyCtx)
#   - a map:  command: <name>
#             args: [arg0, arg1, ...]   # optional
# Args follow the same syntax as the CLI (vec:/rot: prefixes, quoted strings, etc.).

netlog:
  skip:
    - All_Kill
    - AllRagdoll
    - All_ShowHit
    - All_SpawnFX
    - All_Gunsling
    - StartMovement
    - Server_ShowHit
    - Server_StopFire
    - Server_SetUsing
    - RPC_OnStopEvent
    - ServerMovePacked
    - StopShootingSound
    - Server_SetRunning
    - ServerUpdateCamera
    - Client_ReceiveData
    - Server_StartSalute
    - All_ShowHit_Terrain
    - Server_ClimbLedge 
    - Client_MissionShout
    - All_PlayAlertScream
    - Server_SetIsSliding
    - Server_UpdateTarget
    - Server_SetJumpPressed
    - Server_SetIsShooting
    - All_SetHomingLocation
    - Server_SetFallVelocity # Holy fucking spam why are we delegating so much to clients??????
    - Client_ShowDamageNumber
    - All_DepartFadeFromBlack
    - ClientMoveResponsePacked
    - Netmulticast_GlobalBusMix
    - Server_SetGameOwnerStatus # Me when i spam myself
    - Client_ReceiveCarverSizes 
    - All_OnCharacterUsedAirJump
    - ServerSetSpectatorLocation
    - Server_ShotHiw_Destructible
    - Server_SetGenerationFraction
    - Server_RecordParticipantCursor # Brother, we don't need people to know THIS often
    - Client_ReceiveParticipantCursor
    - Client_ReceiveMinionDamageNumber
    - Server_SetIsPressingMovementInput

autorun:
  - lognetclient
  - lognetserver
  - norecoil
  # Mouse side buttons → open SpaceRig menus remotely (ramrod)
  - command: bind
    args: [mouse5, ramrod, loadout]
  - command: bind
    args: [mouse4, ramrod, merit]
#   - command: call
#     args: [Server_SetFallVelocity, 0.0]
#   - command: set
#     args: [myvar, hello]
  - command: bind
    args: [F3, randneg]
# autorun.cfg — commands run on mod load and whenever 'runcfg' is run.
#
# Searched like config.yaml: next to the module DLL (distribution), then two
# directories up (development, next to ElytrasMods.sln). Point the `autorun`
# cvar at a different file to switch profiles (set autorun <path>).
#
# One console command per line, exactly as you'd type it in the overlay/CLI.
# Blank lines and lines starting with '#' or '//' are ignored.

lognetclient
lognetserver
norecoil

# Mouse side buttons -> open SpaceRig menus remotely (ramrod)
bind mouse5 ramrod loadout
bind mouse4 ramrod merit

bind F3 randneg
